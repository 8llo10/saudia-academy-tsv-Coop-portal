<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Saudia Academy TSV Co-op Portal animated header</title>
  <desc id="desc">A soft aviation and maintenance themed animated header for a GitHub README.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071017"/>
      <stop offset="0.5" stop-color="#102333"/>
      <stop offset="1" stop-color="#071017"/>
    </linearGradient>

    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B7D7E8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#B7D7E8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#B7D7E8" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #F7FBFF; letter-spacing: .5px; }
      .sub { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #D8E7F2; opacity: .88; }
      .tag { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #D8E7F2; opacity: .78; }
      .tiny { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #B7D7E8; opacity: .72; }

      .float-a { animation: floatA 6s ease-in-out infinite; }
      .float-b { animation: floatB 8s ease-in-out infinite; }
      .pulse { animation: pulse 3.4s ease-in-out infinite; transform-origin: center; }
      .dash { stroke-dasharray: 12 16; animation: dash 20s linear infinite; }
      .slow-dash { stroke-dasharray: 5 12; animation: dash 28s linear infinite reverse; }
      .plane { animation: planeMove 13s ease-in-out infinite; transform-origin: center; filter: url(#softGlow); }
      .tool { animation: toolFloat 7s ease-in-out infinite; transform-origin: center; opacity: .36; }

      @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes floatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
      @keyframes pulse { 0%,100% { opacity: .18; transform: scale(1); } 50% { opacity: .38; transform: scale(1.04); } }
      @keyframes dash { to { stroke-dashoffset: -420; } }
      @keyframes planeMove {
        0% { transform: translateX(-120px) translateY(18px) rotate(-4deg); opacity: 0; }
        12% { opacity: .82; }
        50% { transform: translateX(540px) translateY(-8px) rotate(2deg); opacity: .88; }
        88% { opacity: .82; }
        100% { transform: translateX(1260px) translateY(-18px) rotate(4deg); opacity: 0; }
      }
      @keyframes toolFloat {
        0%,100% { transform: translateY(0) rotate(-8deg); }
        50% { transform: translateY(-10px) rotate(8deg); }
      }
    </style>
  </defs>

  <rect width="1200" height="260" rx="30" fill="url(#bg)"/>

  <circle cx="1010" cy="56" r="96" fill="#B7D7E8" opacity=".05" class="pulse"/>
  <circle cx="210" cy="210" r="120" fill="#8AB8D6" opacity=".045" class="pulse"/>
  <circle cx="995" cy="188" r="44" stroke="#B7D7E8" stroke-opacity=".16" stroke-width="1.2" class="float-a"/>
  <circle cx="1080" cy="95" r="20" stroke="#B7D7E8" stroke-opacity=".18" stroke-width="1.2" class="float-b"/>

  <path d="M0 178 C210 126 318 216 510 164 C720 105 858 208 1200 138" stroke="url(#line)" stroke-width="1.5" class="dash" opacity=".75"/>
  <path d="M0 98 C235 52 355 122 540 88 C747 50 955 110 1200 66" stroke="#B7D7E8" stroke-opacity=".14" stroke-width="1.2" class="slow-dash"/>

  <g class="plane">
    <path d="M86 68 L178 96 L186 111 L96 98 L65 136 L47 131 L63 91 L18 82 L12 70 L65 72 L93 35 L111 39 L86 68Z" fill="#F7FBFF" opacity=".82"/>
    <path d="M66 72 L18 82 L12 70 L65 72Z" fill="#8AB8D6" opacity=".72"/>
    <path d="M96 98 L65 136 L47 131 L63 91Z" fill="#8AB8D6" opacity=".55"/>
    <path d="M178 96 L186 111 L153 106Z" fill="#B7D7E8" opacity=".65"/>
  </g>

  <g transform="translate(922 142)" class="tool">
    <path d="M37 6 C29 3 19 5 13 12 C8 18 7 26 11 33 L0 44 C-3 47 -3 52 0 55 C3 58 8 58 11 55 L22 44 C29 48 38 47 44 42 C51 36 53 27 50 19 L39 30 L29 20 L37 6Z" fill="#D8E7F2"/>
  </g>

  <g transform="translate(110 54)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">Saudia Academy TSV Co-op Portal</text>
    <text class="sub" x="2" y="62">Operational access menu for selected TSV department systems</text>

    <g transform="translate(2 100)">
      <rect x="0" y="0" width="152" height="34" rx="17" fill="#FFFFFF" opacity=".08" stroke="#D8E7F2" stroke-opacity=".18"/>
      <text class="tag" x="19" y="22">HTML • CSS • JS</text>

      <rect x="168" y="0" width="116" height="34" rx="17" fill="#FFFFFF" opacity=".08" stroke="#D8E7F2" stroke-opacity=".18"/>
      <text class="tag" x="188" y="22">PHP Safe</text>

      <rect x="300" y="0" width="154" height="34" rx="17" fill="#FFFFFF" opacity=".08" stroke="#D8E7F2" stroke-opacity=".18"/>
      <text class="tag" x="321" y="22">Public Showcase</text>
    </g>

    <text class="tiny" x="2" y="168">emspsaa.com</text>
  </g>

  <g opacity=".18">
    <path d="M790 190 h78 m-39 -39 v78" stroke="#D8E7F2" stroke-width="2" stroke-linecap="round"/>
    <circle cx="829" cy="190" r="25" stroke="#D8E7F2" stroke-width="2"/>
  </g>
</svg>
